<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据资源智能治理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f7fa;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 400px;
        }
        
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .login-btn:hover {
            background: #5568d3;
        }
        
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>数据资源智能治理平台</h2>
            <div id="errorMessage" class="error-message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
        </div>
    </div>
    
    <script>
        // 登录超时时间设置（与 main.html 保持一致）
        const LOGIN_TIMEOUT = 30; // 分钟
        
        // 生成指定范围内的随机时间
        function generateRandomDateTime() {
            const start = new Date('2025-12-15T00:00:00').getTime();
            const end = new Date('2025-12-22T23:59:59').getTime();
            const randomTime = start + Math.random() * (end - start);
            
            const date = new Date(randomTime);
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            
            return {
                date: `${year}-${month}-${day}`,
                datetime: `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`
            };
        }
        
        // 替换页面中所有时间为指定范围内的随机时间
        function updateAllDates() {
            // 替换所有日期时间格式 (YYYY-MM-DD HH:MM:SS)
            const datetimeRegex = /\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/g;
            const html = document.body.innerHTML;
            const updatedHtml = html.replace(datetimeRegex, () => generateRandomDateTime().datetime);
            document.body.innerHTML = updatedHtml;
            
            // 替换所有日期格式 (YYYY-MM-DD)
            const dateRegex = /\b\d{4}-\d{2}-\d{2}\b/g;
            const finalHtml = document.body.innerHTML.replace(dateRegex, () => generateRandomDateTime().date);
            document.body.innerHTML = finalHtml;
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // 简单的登录验证（演示用）
            if (username === 'admin' && password === 'admin123') {
                // 登录成功，跳转到主页面
                window.location.href = 'main.html';
            } else {
                errorMessage.textContent = '用户名或密码错误';
            }
        });
    </script>
</body>
</html>
